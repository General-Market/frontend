<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <!-- DB badge: red rounded rectangle with white DB text -->
  <rect x="10" y="8" width="64" height="64" rx="8" fill="#ec0016"/>
  <rect x="14" y="12" width="56" height="56" rx="5" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <text x="42" y="52" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="800" fill="#ffffff" letter-spacing="-0.02em">DB</text>
  <!-- Deutsche Bahn wordmark -->
  <text x="90" y="42" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="-0.01em">Deutsche Bahn</text>
  <text x="90" y="62" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="0.04em">TRAIN DELAYS</text>
</svg>